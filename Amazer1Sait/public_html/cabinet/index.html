<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazer Games — Личный кабинет</title>
    <!-- Подключаем современные иконки FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: #050508; 
            color: #fff; 
            padding: 20px; 
            line-height: 1.6; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Зелёное уведомление сверху, точно как на скриншоте */
        .welcome-alert {
            width: 100%;
            max-width: 800px;
            background: rgba(4, 28, 15, 0.6);
            border: 1px solid rgba(0, 255, 102, 0.15);
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            color: #00ff66;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        /* Широкий премиум-контейнер профиля под стиль скриншота */
        .profile-container {
            background: #0b0b0f;
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            display: none;
        }

        .profile-layout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .profile-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Стили для центрированного окна авторизации */
        .auth-container { 
            background: #0b0b0f; 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            padding: 45px 40px; 
            border-radius: 16px; 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.8); 
            display: none; 
        }

        /* Плавная фирменная анимация */
        .animate-fade {
            animation: cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s forwards appearance;
        }
        @keyframes appearance {
            from { opacity: 0; transform: scale(0.97) translateY(10px); filter: blur(3px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        
        h3 { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1.5px; }
        
        /* Группы полей ввода */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.72rem; color: #5a5b63; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; letter-spacing: 1.2px; }
        .form-group input { width: 100%; padding: 14px; background: #040406; border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 8px; color: #fff; font-size: 0.95rem; outline: none; font-weight: 600; transition: all 0.3s ease; }
        .form-group input:focus { border-color: rgba(255, 255, 255, 0.15); }
        
        /* Главная кнопка действия (белая глянцевая) */
        .btn-submit { padding: 14px 24px; background: #fff; color: #000; border: none; font-weight: 800; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.8px; font-size: 0.8rem; transition: all 0.3s ease; }
        .btn-submit:hover { background: #f0f0f0; transform: translateY(-1px); }
        
        /* Боковые тёмные кнопки как на скриншоте */
        .side-buttons { display: flex; flex-direction: column; gap: 10px; min-width: 200px; }
        .btn-secondary { background: #141419; color: #ccc; border: 1px solid rgba(255,255,255,0.02); text-align: left; display: flex; align-items: center; gap: 10px; }
        .btn-secondary:hover { background: #1c1c24; color: #fff; }

        .toggle-link { display: block; margin-top: 20px; font-size: 0.82rem; color: #5a5b63; cursor: pointer; text-decoration: none; font-weight: 600; }
        .toggle-link:hover { color: #fff; }

        /* Оформление круглого аватара профиля */
        .avatar-wrapper { position: relative; width: 90px; height: 90px; }
        .user-avatar { width: 100%; height: 100%; border-radius: 50%; background: #111116; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #fff; border: 2px solid rgba(255, 255, 255, 0.1); overflow: hidden; }

        .user-info-text { display: flex; flex-direction: column; gap: 5px; text-align: left; }
        .user-info-text .sub-label { font-size: 0.65rem; color: #5a5b63; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .user-info-text h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
        
        /* Фиолетовая плашка USER как на скриншоте */
        .badge-role { display: inline-flex; align-items: center; gap: 6px; background: rgba(138, 92, 246, 0.15); color: #a78bfa; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; width: max-content; margin-top: 4px; border: 1px solid rgba(138, 92, 246, 0.2); }

        /* Раскрывающаяся панель изменения данных */
        .settings-block {
            width: 100%;
            max-width: 800px;
            background: #0b0b0f;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-top: none;
            padding: 30px;
            border-radius: 0 0 12px 12px;
            margin-top: -10px;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <!-- УВЕДОМЛЕНИЕ ПРИ УСПЕШНОМ ВХОДЕ -->
    <div id="welcomeAlert" class="welcome-alert">
        <i class="fa-solid fa-circle-check"></i>
        <span>Добро пожаловать, <span id="alertUsername">User</span>!</span>
    </div>

    <!-- ОКНО ВХОДА ИЛИ РЕГИСТРАЦИИ -->
    <div id="authBlock" class="auth-container animate-fade">
        <h3 id="authTitle">Вход в аккаунт</h3>
        <div class="form-group">
            <label><i class="fa-brands fa-roblox"></i> Никнейм в Roblox</label>
            <input type="text" id="authLogin" placeholder="Имя персонажа">
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-lock"></i> Пароль</label>
            <input type="password" id="authPassword" placeholder="••••••••">
        </div>
        <button class="btn-submit" style="width: 100%;" id="btnMainAction" onclick="handleAuth()">Войти</button>
        <span class="toggle-link" id="btnToggleMode" onclick="toggleMode()">У меня еще нет аккаунта</span>
    </div>
    <!-- ЛИЧНЫЙ ПРОФИЛЬ ИГРОКА (Широкий дизайн по скриншоту) -->
    <div id="profileBlock" class="profile-container animate-fade">
        <div class="profile-layout">
            <div class="profile-main">
                <div class="avatar-wrapper">
                    <!-- Место под аватарку игрока (по умолчанию дефолт-иконка юзера) -->
                    <div class="user-avatar" id="avatarDiv">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
                <div class="user-info-text">
                    <span class="sub-label">// Account</span>
                    <h2 id="profileUsername">Загрузка...</h2>
                    <div class="badge-role" id="profileRoleBadge">
                        <i class="fa-solid fa-shield-halved"></i> <span id="profileRole">USER</span>
                    </div>
                </div>
            </div>
            
            <!-- Правое меню управления аккаунтом -->
            <div class="side-buttons">
                <button class="btn-submit btn-secondary" onclick="toggleSettings()">
                    <i class="fa-solid fa-gear"></i> Настройки
                </button>
                <button class="btn-submit btn-secondary" style="color: #ff4a4a; border-color: rgba(255, 74, 74, 0.1);" onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i> Выйти из профиля
                </button>
            </div>
        </div>
    </div>

    <!-- БЛОК НАСТРОЕК (Появляется снизу под профилем) -->
    <div id="settingsBlock" class="settings-block animate-fade">
        <h3 style="font-size: 1.1rem; margin-bottom: 20px;"><i class="fa-solid fa-user-pen"></i> Изменение никнейма</h3>
        <div class="settings-grid">
            <div class="form-group">
                <label>Новый никнейм Roblox</label>
                <input type="text" id="newUsername" placeholder="Введите новое имя">
            </div>
            <div class="form-group">
                <label>Текущий пароль от сайта</label>
                <input type="password" id="confirmPassword" placeholder="Введите пароль для проверки">
            </div>
        </div>
        <button class="btn-submit" onclick="changeUsername()" style="background: #00ff66; color: #000; margin-top: 5px;">
            Сохранить изменения
        </button>
    </div>

    <!-- НАЧАЛО СКРИПТОВОЙ ЛОГИКИ СТРАНИЦЫ -->
    <script>
        let isLoginMode = true;

        // Автоматическая проверка сессии при загрузке лаунчера/страницы
        window.onload = function() {
            const currentSession = localStorage.getItem('amazer_current_user');
            if (currentSession) {
                const userData = JSON.parse(localStorage.getItem('user_' + currentSession.toLowerCase()));
                if (userData) {
                    showProfile(userData, false); // Вход без повторного отображения алерта сверху
                    return;
                }
            }
            document.getElementById('authBlock').style.display = 'block';
        };

        // Анимация и переключение режимов Вход / Регистрация
        function toggleMode() {
            isLoginMode = !isLoginMode;
            const authBlock = document.getElementById('authBlock');
            
            authBlock.classList.remove('animate-fade');
            void authBlock.offsetWidth; // Магический хак для перезапуска CSS-анимации
            authBlock.classList.add('animate-fade');

            document.getElementById('authTitle').innerText = isLoginMode ? 'Вход в аккаунт' : 'Регистрация';
            document.getElementById('btnMainAction').innerText = isLoginMode ? 'Войти' : 'Создать аккаунт';
            document.getElementById('btnToggleMode').innerText = isLoginMode ? 'У меня еще нет аккаунта' : 'У меня уже есть аккаунт';
            
            document.getElementById('authLogin').value = '';
            document.getElementById('authPassword').value = '';
        }

        // Обработчик отправки формы авторизации и регистрации
        function handleAuth() {
            const username = document.getElementById('authLogin').value.trim();
            const password = document.getElementById('authPassword').value.trim();

            if (!username || !password) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }

            const userKey = 'user_' + username.toLowerCase();

            if (isLoginMode) {
                const storedUser = localStorage.getItem(userKey);
                if (!storedUser) {
                    alert('Пользователь с таким никнеймом не найден!');
                    return;
                }

                const userData = JSON.parse(storedUser);
                if (userData.password !== password) {
                    alert('Неверный пароль!');
                    return;
                }

                localStorage.setItem('amazer_current_user', username.toLowerCase());
                showProfile(userData, true); // Вход с отображением красивого уведомления

            } else {
                const checkUser = localStorage.getItem(userKey);
                if (checkUser) {
                    alert('Этот никнейм уже зарегистрирован!');
                    return;
                }

                const newUserData = {
                    username: username,
                    password: password,
                    role: 'USER'
                };

                localStorage.setItem(userKey, JSON.stringify(newUserData));
                alert('Аккаунт успешно создан! Теперь войдите в него.');
                toggleMode();
            }
        }
        // Показ профиля и вывод верхнего приветственного уведомления
        function showProfile(user, triggerAlert) {
            document.getElementById('authBlock').style.display = 'none';
            document.getElementById('profileBlock').style.display = 'block';
            
            document.getElementById('profileUsername').innerText = user.username;
            document.getElementById('profileRole').innerText = user.role.toUpperCase();

            // Всплывающее зелёное уведомление (как на скриншоте)
            if (triggerAlert) {
                const welcomeAlert = document.getElementById('welcomeAlert');
                document.getElementById('alertUsername').innerText = user.username;
                welcomeAlert.style.display = 'flex';
                
                // Автоматически скрываем уведомление через 5 секунд
                setTimeout(() => { 
                    welcomeAlert.style.display = 'none'; 
                }, 5000);
            }
        }

        // Открытие и закрытие панели настроек под профилем
        function toggleSettings() {
            const settingsBlock = document.getElementById('settingsBlock');
            if (settingsBlock.style.display === 'block') {
                settingsBlock.style.display = 'none';
            } else {
                settingsBlock.style.display = 'block';
                // Очищаем поля ввода перед заполнением
                document.getElementById('newUsername').value = '';
                document.getElementById('confirmPassword').value = '';
            }
        }

        // Безопасное изменение Username с проверкой текущего пароля
        function changeUsername() {
            const newName = document.getElementById('newUsername').value.trim();
            const confirmPass = document.getElementById('confirmPassword').value.trim();
            const currentSession = localStorage.getItem('amazer_current_user');

            if (!newName || !confirmPass) {
                alert('Пожалуйста, заполните оба поля в настройках!');
                return;
            }

            const oldUserKey = 'user_' + currentSession;
            const storedData = localStorage.getItem(oldUserKey);
            
            if (!storedData) {
                alert('Ошибка сессии. Перезайдите в аккаунт.');
                logout();
                return;
            }

            const userData = JSON.parse(storedData);

            // 1. Сверяем пароль для защиты от несанкционированного изменения
            if (userData.password !== confirmPass) {
                alert('Неверный пароль от сайта! Изменение никнейма отклонено.');
                return;
            }

            // 2. Проверяем, свободен ли новый никнейм в локальной базе
            const newConstKey = 'user_' + newName.toLowerCase();
            if (newName.toLowerCase() !== currentSession && localStorage.getItem(newConstKey)) {
                alert('Этот никнейм уже занят другим игроком!');
                return;
            }

            // 3. Полная перезапись: удаляем старый ключ и создаем обновленный
            localStorage.removeItem(oldUserKey);
            
            userData.username = newName; // Обновляем отображаемый текст
            localStorage.setItem(newConstKey, JSON.stringify(userData)); // Записываем в базу
            localStorage.setItem('amazer_current_user', newName.toLowerCase()); // Перевыпускаем сессию

            // 4. Мгновенно обновляем интерфейс личного кабинета
            document.getElementById('profileUsername').innerText = newName;
            alert('Никнейм успешно изменен!');
            toggleSettings();
        }

        // Полный выход из профиля и очистка временных окон
        function logout() {
            localStorage.removeItem('amazer_current_user');
            document.getElementById('profileBlock').style.display = 'none';
            document.getElementById('settingsBlock').style.display = 'none';
            document.getElementById('welcomeAlert').style.display = 'none';
            document.getElementById('authBlock').style.display = 'block';
            
            // Возвращаем форму к дефолтному режиму входа
            isLoginMode = false;
            toggleMode();
        }

        // Блокировка вызова контекстного меню через ПКМ
        document.addEventListener('contextmenu', function(e) { 
            e.preventDefault(); 
        });
    </script>
</body>
</html>
