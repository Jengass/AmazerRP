<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazer Games — Личный кабинет</title>
    <!-- Подключаем современные иконки FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: #050508; 
            color: #fff; 
            padding: 20px; 
            line-height: 1.6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Задний футуристичный фон лаунчера */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 70%);
            top: 15%;
            left: 15%;
            z-index: -1;
        }

        /* Общие премиум-контейнеры */
        .auth-container, .profile-container { 
            background: #0b0b0f; 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            padding: 45px 40px; 
            border-radius: 16px; 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.8); 
            display: none; 
            position: relative;
        }

        /* Кастомная плавная анимация появления */
        .animate-fade {
            animation: cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s forwards appearance;
        }
        @keyframes appearance {
            from { opacity: 0; transform: scale(0.97) translateY(10px); filter: blur(3px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        
        h3 { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 1.5px; }
        
        /* Стили полей ввода */
        .form-group { margin-bottom: 22px; text-align: left; }
        .form-group label { display: block; font-size: 0.72rem; color: #5a5b63; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; letter-spacing: 1.2px; }
        .form-group input { width: 100%; padding: 15px; background: #040406; border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 8px; color: #fff; font-size: 0.95rem; outline: none; font-weight: 600; transition: all 0.3s ease; }
        .form-group input:focus { border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 0 20px rgba(255,255,255,0.02); }
        
        /* Кнопка действия (белая глянцевая) */
        .btn-submit { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: 800; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.8px; font-size: 0.82rem; margin-top: 10px; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .btn-submit:hover { background: #f0f0f0; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,255,255,0.12); }
        .btn-submit:active { transform: translateY(0); }
        
        .toggle-link { display: block; margin-top: 20px; font-size: 0.82rem; color: #5a5b63; cursor: pointer; text-decoration: none; transition: 0.2s; font-weight: 600; }
        .toggle-link:hover { color: #fff; }

        /* Элементы личного профиля */
        .avatar-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 25px auto; }
        .user-avatar { width: 100%; height: 100%; border-radius: 50%; background: #111116; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #fff; border: 1px solid rgba(255, 255, 255, 0.06); transition: all 0.4s ease; }
        .avatar-wrapper:hover .user-avatar { transform: scale(1.04); border-color: rgba(255, 255, 255, 0.4); box-shadow: 0 0 25px rgba(255,255,255,0.05); }
        
        /* Аккуратный статус-индикатор игрока */
        .status-dot { position: absolute; bottom: 6px; right: 6px; width: 14px; height: 14px; background: #00ff66; border-radius: 50%; border: 3px solid #0b0b0f; box-shadow: 0 0 12px #00ff66; }

        /* Карточка статуса проекта */
        .profile-stats { margin: 25px 0 35px 0; text-align: left; }
        .stat-card { background: #111116; border: 1px solid rgba(255,255,255,0.01); padding: 18px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .stat-card:hover { background: #15151b; border-color: rgba(255,255,255,0.04); }
        .stat-label { font-size: 0.85rem; color: #5a5b63; font-weight: 700; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 0.95rem; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Минималистичная кнопка выхода */
        .btn-logout { background: transparent; border: 1px solid rgba(255,74,74,0.15); color: #ff4a4a; margin-top: 5px; }
        .btn-logout:hover { background: rgba(255,74,74,0.05); border-color: #ff4a4a; box-shadow: 0 6px 20px rgba(255,74,74,0.08); color: #ff4a4a; }
    </style>
</head>
<body>

    <!-- ФОРМА ВХОДА / РЕГИСТРАЦИИ -->
    <div id="authBlock" class="auth-container animate-fade">
        <h3 id="authTitle">Вход в аккаунт</h3>
        <div class="form-group">
            <label><i class="fa-brands fa-roblox"></i> Ваш никнейм в Roblox</label>
            <input type="text" id="authLogin" placeholder="Имя персонажа">
        </div>
        <div class="form-group">
            <label><i class="fa-solid fa-lock"></i> Пароль от кабинета</label>
            <input type="password" id="authPassword" placeholder="••••••••">
        </div>
        <button class="btn-submit" id="btnMainAction" onclick="handleAuth()">Войти</button>
        <span class="toggle-link" id="btnToggleMode" onclick="toggleMode()">У меня еще нет аккаунта</span>
    </div>

    <!-- ЛИЧНЫЙ ПРОФИЛЬ ИГРОКА -->
    <div id="profileBlock" class="profile-container animate-fade">
        <div class="avatar-wrapper">
            <div class="user-avatar"><i class="fa-solid fa-user-gear"></i></div>
            <div class="status-dot"></div>
        </div>
        <h3 id="profileUsername">Игрок</h3>
        
        <!-- Карточка статуса -->
        <div class="profile-stats">
            <div class="stat-card">
                <span class="stat-label"><i class="fa-solid fa-shield-halved"></i> Ранг на проекте</span>
                <span class="stat-value" id="profileRole">Игрок</span>
            </div>
        </div>
        
        <!-- Кнопка управления -->
        <button class="btn-submit btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Выйти из профиля</button>
    </div>
    <script>
        let isLoginMode = true;

        // Автоматическая проверка авторизации на ПК
        window.onload = function() {
            const currentSession = localStorage.getItem('amazer_current_user');
            if (currentSession) {
                const userData = JSON.parse(localStorage.getItem('user_' + currentSession));
                if (userData) {
                    showProfile(userData);
                    return;
                }
            }
            document.getElementById('authBlock').style.display = 'block';
        };

        // Переключение режимов Вход / Регистрация
        function toggleMode() {
            isLoginMode = !isLoginMode;
            
            const authBlock = document.getElementById('authBlock');
            authBlock.classList.remove('animate-fade');
            void authBlock.offsetWidth; // Перезапуск красивой CSS-анимации
            authBlock.classList.add('animate-fade');

            document.getElementById('authTitle').innerText = isLoginMode ? 'Вход в аккаунт' : 'Регистрация';
            document.getElementById('btnMainAction').innerText = isLoginMode ? 'Войти' : 'Создать аккаунт';
            document.getElementById('btnToggleMode').innerText = isLoginMode ? 'У меня еще нет аккаунта' : 'У меня уже есть аккаунт';
        }

        // Обработка отправки формы
        function handleAuth() {
            const username = document.getElementById('authLogin').value.trim();
            const password = document.getElementById('authPassword').value.trim();

            if (!username || !password) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }

            if (isLoginMode) {
                // ВХОД В ПРОФИЛЬ
                const storedUser = localStorage.getItem('user_' + username.toLowerCase());
                if (!storedUser) {
                    alert('Пользователь с таким никнеймом не найден!');
                    return;
                }

                const userData = JSON.parse(storedUser);
                if (userData.password !== password) {
                    alert('Неверный пароль!');
                    return;
                }

                localStorage.setItem('amazer_current_user', username.toLowerCase());
                showProfile(userData);

            } else {
                // РЕГИСТРАЦИЯ
                const checkUser = localStorage.getItem('user_' + username.toLowerCase());
                if (checkUser) {
                    alert('Этот никнейм уже зарегистрирован!');
                    return;
                }

                const newUserData = {
                    username: username,
                    password: password,
                    role: 'Игрок'
                };

                localStorage.setItem('user_' + username.toLowerCase(), JSON.stringify(newUserData));
                alert('Аккаунт успешно создан! Войдите в него.');
                toggleMode();
            }
        }

        // Показ страницы профиля
        function showProfile(user) {
            document.getElementById('authBlock').style.display = 'none';
            document.getElementById('profileBlock').style.display = 'block';
            
            document.getElementById('profileUsername').innerText = user.username;
            document.getElementById('profileRole').innerText = user.role;
        }

        // Выход из аккаунта
        function logout() {
            localStorage.removeItem('amazer_current_user');
            document.getElementById('profileBlock').style.display = 'none';
            document.getElementById('authBlock').style.display = 'block';
        }

        // Блокировка вызова кода страницы через ПКМ
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    </script>
</body>
</html>
