<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #0a0a0c; color: #fff; padding: 20px; line-height: 1.6; }
        
        .donate-container { max-width: 900px; margin: 40px auto 0 auto; text-align: center; }
        .section-label { color: #3e3f44; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; text-align: left; margin-bottom: 8px; display: block; }
        .header-title { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; text-align: left; margin-bottom: 40px; letter-spacing: 0.5px; }

        /* Поле ввода никнейма в стиле лаунчера */
        .user-box { background: #111114; border: 1px solid rgba(255, 255, 255, 0.02); padding: 30px; border-radius: 6px; max-width: 450px; margin: 0 auto 50px auto; }
        .user-box input { width: 100%; padding: 14px; background: #07070a; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 4px; color: #fff; font-size: 1rem; text-align: center; outline: none; font-weight: 600; letter-spacing: 1px; transition: 0.2s; }
        .user-box input:focus { border-color: rgba(255, 255, 255, 0.2); }

        /* Сетка премиум-товаров */
        .donate-grid { display: flex; gap: 30px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        .donate-card { background: #111114; border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 6px; padding: 35px 25px; width: 320px; position: relative; text-align: left; }
        .donate-card:hover { border-color: rgba(255, 255, 255, 0.08); }
        
        .donate-card i { font-size: 3rem; color: #fff; margin-bottom: 20px; display: block; }
        .donate-card h3 { font-size: 1.4rem; margin-bottom: 8px; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .donate-card p { color: #888991; font-size: 0.85rem; min-height: 45px; line-height: 1.5; }
        
        .donate-card .price { font-size: 2rem; color: #fff; font-weight: 900; margin: 20px 0; }
        .donate-card .price span { font-size: 1.3rem; color: #888991; margin-left: 2px; }
        
        .buy-btn { width: 100%; padding: 13px; background: #fff; border: none; color: #000; font-weight: 700; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.85rem; transition: 0.2s; }
        .buy-btn:hover { background: #e6e6e6; }
    </style>
</head>
<body>
    <div class="donate-container">
        <span class="section-label">// авто-магазин</span>
        <h2 class="header-title">Привилегии</h2>

        <div class="user-box">
            <input type="text" id="robloxNick" placeholder="ВВЕДИТЕ ВАШ НИК В ROBLOX" autocomplete="off">
        </div>

        <div class="donate-grid">
            <!-- Модератор -->
            <div class="donate-card">
                <i class="fa-solid fa-user-shield"></i>
                <h3>Модератор</h3>
                <p>Права младшей модерации. Возможность выдавать муты чата, кикать нарушителей и следить за соблюдением RP режима.</p>
                <div class="price">250 <span>₽</span></div>
                <button class="buy-btn" onclick="startPay('moderator')">Приобрести</button>
            </div>

            <!-- Администратор -->
            <div class="donate-card">
                <i class="fa-solid fa-shield-halved"></i>
                <h3>Администратор</h3>
                <p>Полный уровень админ-прав. Доступ к блокировкам аккаунтов (бан), расширенным командам и полному управлению сервером.</p>
                <div class="price">999 <span>₽</span></div>
                <button class="buy-btn" onclick="startPay('administrator')">Приобрести</button>
            </div>
        </div>
    </div>
    <script>
        function startPay(item) {
            var nick = document.getElementById('robloxNick').value.trim();
            if(nick === "") { alert("Ошибка! Введите ваш никнейм перед покупкой."); return; }
            alert("Запрос отправлен.");
        }
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('selectstart', function(e) { e.preventDefault(); });
    </script>
</body>
</html>
